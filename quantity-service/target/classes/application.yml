server:
  port: 8082

spring:
  application:
    name: QUANTITY-SERVICE
  datasource:
    url: jdbc:mysql://localhost:3306/qma_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

security:
  jwt:
    secret: ${JWT_SECRET}
