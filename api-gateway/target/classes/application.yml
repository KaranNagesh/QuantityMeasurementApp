server:
  port: 8080

spring:
  application:
    name: API-GATEWAY
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/v1/auth/**
            - id: auth-service-login
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/login/**
            - id: auth-service-oauth2
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/oauth2/**
            - id: quantity-service
              uri: lb://QUANTITY-SERVICE
              predicates:
                - Path=/api/v1/quantities/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

security:
  jwt:
    secret: ${JWT_SECRET}
